/* ---- tiny RFC-4180-ish CSV parser ---- */
function parseCSV(text) {
  const rows = []; let row = [], field = "", i = 0, inQ = false;
  text = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  while (i < text.length) {
    const c = text[i];
    if (inQ) {
      if (c === '"') { if (text[i+1] === '"') { field += '"'; i++; } else inQ = false; }
      else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ",") { row.push(field); field = ""; }
      else if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
      else field += c;
    }
    i++;
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function csvToProjects(text) {
  const rows = parseCSV(text);
  if (!rows.length) return [];
  const head = rows[0].map(h => h.trim());
  const idx = name => head.indexOf(name);
  const c = { dom: idx("dominio"), eco: idx("ecosystem"), svc: idx("servizio"),
    be: idx("BE hosting"), fe: idx("FE hosting"), oth: idx("others"),
    st: idx("status"), fwd: idx("forward to"), att: idx("attention") };
  const g = (r, k) => (k >= 0 && r[k] != null ? r[k].trim() : "");
  const out = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    if (g(row, c.st).toLowerCase() !== "deployed") continue;
    out.push({ domain: g(row, c.dom), ecosystem: g(row, c.eco), service: g(row, c.svc),
      be: g(row, c.be), fe: g(row, c.fe), others: g(row, c.oth),
      forward: g(row, c.fwd), attention: g(row, c.att) });
  }
  out.sort((a, b) => (a.ecosystem.toLowerCase() || "zzz").localeCompare(b.ecosystem.toLowerCase() || "zzz") || a.domain.toLowerCase().localeCompare(b.domain.toLowerCase()));
  return out;
}

function hostClass(token) {
  const t = token.toLowerCase();
  if (t.includes("gh") || t.includes("pages") || t.includes("github")) return "gh";
  if (t.includes("netlify")) return "net";
  if (t.includes("vercel")) return "ver";
  if (t.includes("server")) return "srv";
  if (t.includes("cloudflare")) return "cf";
  return "ext";
}
function hostTokens(v) {
  return (v || "").split(/[,/]/).map(s => s.trim()).filter(s => s && s !== "--");
}

const ECO_LABEL = e => e || "Other";
const ESC = s => (s || "").replace(/[&<>"]/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[m]));

function matches(p) {
  if (state.attn && p.attention.toLowerCase() !== "nok") return false;
  if (state.eco !== null && (p.ecosystem || "") !== state.eco) return false;
  if (state.q) {
    const hay = [p.domain, p.service, p.ecosystem, p.be, p.fe, p.others, p.forward].join(" ").toLowerCase();
    if (!state.q.split(/\s+/).every(t => hay.includes(t))) return false;
  }
  return true;
}

function renderChips() {
  const counts = {};
  DATA.forEach(p => { const k = p.ecosystem || ""; counts[k] = (counts[k] || 0) + 1; });
  const ecos = Object.keys(counts).sort((a, b) => (a.toLowerCase() || "zzz").localeCompare(b.toLowerCase() || "zzz"));
  const nok = DATA.filter(p => p.attention.toLowerCase() === "nok").length;
  const el = document.getElementById("chips");
  let html = `<div class="chip ${state.eco === null && !state.attn ? "on" : ""}" data-eco="__all">All <span class="n">${DATA.length}</span></div>`;
  ecos.forEach(e => {
    html += `<div class="chip ${state.eco === e ? "on" : ""}" data-eco="${ESC(e)}">${ESC(ECO_LABEL(e))} <span class="n">${counts[e]}</span></div>`;
  });
  if (nok) html += `<div class="chip attn ${state.attn ? "on" : ""}" data-attn="1">⚠ Needs attention <span class="n">${nok}</span></div>`;
  el.innerHTML = html;
  el.querySelectorAll(".chip").forEach(ch => ch.addEventListener("click", () => {
    if (ch.dataset.attn) { state.attn = !state.attn; }
    else if (ch.dataset.eco === "__all") { state.eco = null; state.attn = false; }
    else { state.eco = state.eco === ch.dataset.eco ? null : ch.dataset.eco; }
    render();
  }));
}

function cardHTML(p) {
  const url = "https://" + p.domain;
  const svc = p.service && p.service !== p.domain ? `<div class="svc">${ESC(p.service)}</div>` : "";
  const nok = p.attention.toLowerCase() === "nok";
  const badges = [];
  hostTokens(p.fe).forEach(t => badges.push(`<span class="badge ${hostClass(t)}">${ESC(t)}</span>`));
  hostTokens(p.be).forEach(t => badges.push(`<span class="badge ${hostClass(t)}">${ESC(t)} ·be</span>`));
  hostTokens(p.others).forEach(t => badges.push(`<span class="badge ext">${ESC(t)}</span>`));
  if (!badges.length) badges.push(`<span class="badge ext">live</span>`);
  const fwd = p.forward ? `<div class="fwd">→ forwards to <span class="mono">${ESC(p.forward)}</span></div>` : "";
  return `<a class="card" href="${ESC(url)}" target="_blank" rel="noopener" title="${ESC(url)}">
    <div class="head">
      <div>
        <div class="domain mono">${ESC(p.domain)} <span class="arrow">↗</span></div>
        ${svc}
      </div>
      <span class="attn ${nok ? "nok" : ""}" title="${nok ? "Needs attention" : "OK"}"></span>
    </div>
    ${fwd}
    <div class="badges">${badges.join("")}</div>
  </a>`;
}

function render() {
  renderChips();
  const list = DATA.filter(matches);
  const main = document.getElementById("main");
  if (!list.length) {
    main.innerHTML = `<div class="empty"><div class="big">🔍</div>No projects match your filters.</div>`;
  } else {
    const groups = {};
    list.forEach(p => { const k = p.ecosystem || ""; (groups[k] = groups[k] || []).push(p); });
    const keys = Object.keys(groups).sort((a, b) => (a.toLowerCase() || "zzz").localeCompare(b.toLowerCase() || "zzz"));
    main.innerHTML = keys.map(k => `
      <section class="group">
        <h2>${ESC(ECO_LABEL(k))} <span class="cnt">${groups[k].length}</span><span class="bar"></span></h2>
        <div class="grid">${groups[k].map(cardHTML).join("")}</div>
      </section>`).join("");
  }
  document.getElementById("footCount").textContent =
    `${list.length} of ${DATA.length} deployed project${DATA.length === 1 ? "" : "s"}`;
}

function setStatus(kind, text) {
  const el = document.getElementById("status");
  el.className = "status " + kind;
  document.getElementById("statusText").textContent = text;
}

/* initial paint from embedded snapshot */
setStatus("snap", "snapshot");
render();

/* live refresh from the sheet */
fetch(CSV_URL, { cache: "no-store" })
  .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
  .then(text => {
    const live = csvToProjects(text);
    if (live.length) { DATA = live; render(); setStatus("live", "live · synced with sheet"); }
    else setStatus("snap", "snapshot");
  })
  .catch(() => setStatus("snap", "snapshot (offline)"));

/* keyboard: "/" focuses search, Esc clears */
const q = document.getElementById("q");
q.addEventListener("input", e => { state.q = e.target.value.trim().toLowerCase(); render(); });
document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement !== q) { e.preventDefault(); q.focus(); }
  if (e.key === "Escape" && document.activeElement === q) { q.value = ""; state.q = ""; render(); q.blur(); }
});
</script>
