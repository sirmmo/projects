<meta name="description" content="A navigable directory of all deployed projects across the sirmmo ecosystems." />
<link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;🛰️&lt;/text&gt;&lt;/svg&gt;" />
<style>
  :root {
    --bg: #0c0e14;
    --bg-soft: #12151f;
    --panel: #161a26;
    --panel-2: #1b2030;
    --line: #262c3d;
    --line-soft: #1f2433;
    --txt: #e7eaf3;
    --txt-dim: #9aa3b8;
    --txt-faint: #6b7488;
    --accent: #6ea8fe;
    --accent-2: #7c5cff;
    --ok: #43d39e;
    --warn: #ffb454;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 12px 30px -16px rgba(0,0,0,.7);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(124,92,255,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 0%, rgba(110,168,254,.10), transparent 55%),
      var(--bg);
    color: var(--txt);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }
  .mono { font-family: "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, Menlo, Consolas, monospace; }

  /* ---- header ---- */
  header {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(14px);
    background: linear-gradient(180deg, rgba(12,14,20,.92), rgba(12,14,20,.72));
    border-bottom: 1px solid var(--line-soft);
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 22px; }
  .top { display: flex; align-items: center; gap: 18px; padding: 18px 0 14px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .brand .logo {
    width: 40px; height: 40px; flex: none; border-radius: 11px;
    display: grid; place-items: center; font-size: 20px;
    background: linear-gradient(140deg, var(--accent), var(--accent-2));
    box-shadow: 0 6px 18px -6px rgba(124,92,255,.7);
  }
  .brand h1 { font-size: 17px; margin: 0; letter-spacing: .2px; line-height: 1.1; }
  .brand p { margin: 2px 0 0; font-size: 12.5px; color: var(--txt-dim); }
  .grow { flex: 1 1 auto; }
  .status {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12px; color: var(--txt-dim);
    padding: 6px 11px; border: 1px solid var(--line); border-radius: 999px;
    background: var(--panel); white-space: nowrap;
  }
  .status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--txt-faint); }
  .status.live .dot { background: var(--ok); box-shadow: 0 0 0 4px rgba(67,211,158,.16); }
  .status.snap .dot { background: var(--warn); }
  .ghlink { display:inline-flex; align-items:center; gap:7px; font-size:13px; color:var(--txt-dim);
    padding:7px 12px; border:1px solid var(--line); border-radius:999px; background:var(--panel); }
  .ghlink:hover { color: var(--txt); border-color: var(--accent); }

  /* ---- search ---- */
  .searchbar { position: relative; padding-bottom: 14px; }
  .searchbar svg { position: absolute; left: 14px; top: 50%; transform: translateY(calc(-50% - 7px)); color: var(--txt-faint); }
  #q {
    width: 100%; font-size: 15px; color: var(--txt);
    padding: 12px 14px 12px 42px; border-radius: 12px;
    border: 1px solid var(--line); background: var(--bg-soft);
    outline: none; transition: border-color .15s, box-shadow .15s;
  }
  #q::placeholder { color: var(--txt-faint); }
  #q:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(110,168,254,.18); }
  kbd { font-size: 11px; color: var(--txt-faint); border: 1px solid var(--line); border-bottom-width: 2px;
    padding: 1px 6px; border-radius: 6px; background: var(--panel); }
  .searchbar .hint { position:absolute; right:12px; top:11px; }

  /* ---- filter chips ---- */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 14px 0 18px; }
  .chip {
    font-size: 12.5px; padding: 6px 12px; border-radius: 999px; cursor: pointer;
    border: 1px solid var(--line); background: var(--panel); color: var(--txt-dim);
    transition: all .14s; user-select: none; display:inline-flex; align-items:center; gap:7px;
  }
  .chip:hover { color: var(--txt); border-color: #38405a; }
  .chip.on { color: #fff; border-color: transparent; background: linear-gradient(140deg, var(--accent), var(--accent-2)); }
  .chip .n { font-size: 11px; opacity: .7; }
  .chip.attn.on { background: linear-gradient(140deg, #ff9a4d, #ff6b6b); }
  .chip.star.on { background: linear-gradient(140deg, #ffd86b, #ff9a4d); color: #1a1205; }

  /* ---- layout ---- */
  main { max-width: 1180px; margin: 0 auto; padding: 26px 22px 80px; }
  .group { margin-bottom: 38px; scroll-margin-top: 150px; }
  .group h2 {
    display: flex; align-items: baseline; gap: 10px; margin: 0 0 14px;
    font-size: 13px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--txt-dim);
  }
  .group h2 .bar { flex: 1; height: 1px; background: var(--line-soft); }
  .group h2 .cnt { color: var(--txt-faint); font-weight: 600; letter-spacing: normal; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

  .card {
    position: relative; display: flex; flex-direction: column; gap: 12px;
    padding: 16px 16px 14px; border-radius: var(--radius);
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--line); box-shadow: var(--shadow);
    transition: transform .16s ease, border-color .16s, box-shadow .16s;
  }
  .card:hover { transform: translateY(-3px); border-color: #3a4366; box-shadow: 0 1px 2px rgba(0,0,0,.4), 0 22px 44px -22px rgba(110,168,254,.45); }
  .card.featured { border-color: rgba(255,200,90,.42);
    background: linear-gradient(180deg, #1c1d20, #1a1813);
    box-shadow: 0 1px 2px rgba(0,0,0,.4), 0 14px 34px -20px rgba(255,196,84,.55); }
  .card.featured:hover { border-color: rgba(255,200,90,.75); box-shadow: 0 1px 2px rgba(0,0,0,.4), 0 22px 46px -22px rgba(255,196,84,.6); }
  .star { color: #ffcf5a; }
  .group.feat h2 { color: #ffcf5a; }
  .group.feat .bar { background: linear-gradient(90deg, rgba(255,196,84,.45), transparent); }
  .card .head { display: flex; align-items: flex-start; gap: 10px; }
  .card .domain { font-size: 15px; font-weight: 600; line-height: 1.25; word-break: break-word; }
  a.domain::after { content: ""; position: absolute; inset: 0; z-index: 1; border-radius: var(--radius); }
  .card .domain .arrow { color: var(--txt-faint); transition: color .15s, transform .15s; display:inline-block; }
  .card:hover .domain .arrow { color: var(--accent); transform: translate(2px,-2px); }
  .card .addr { font-size: 11.5px; color: var(--txt-faint); margin-top: 3px; word-break: break-all; line-height: 1.3; }
  .card .svc { font-size: 12.5px; color: var(--txt-dim); margin-top: 3px; }
  .attn {
    flex: none; margin-left: auto; width: 9px; height: 9px; border-radius: 50%;
    background: var(--ok); box-shadow: 0 0 0 4px rgba(67,211,158,.14); margin-top: 5px;
  }
  .attn.nok { background: var(--warn); box-shadow: 0 0 0 4px rgba(255,180,84,.16); }

  .badges { display: flex; flex-wrap: wrap; gap: 6px; }
  .badge {
    font-size: 11px; padding: 3px 9px; border-radius: 7px; font-weight: 600; letter-spacing: .02em;
    border: 1px solid var(--line); color: var(--txt-dim); background: var(--bg-soft);
    display: inline-flex; align-items: center; gap: 5px;
  }
  .badge::before { content:""; width:6px; height:6px; border-radius:2px; background: currentColor; opacity:.8; }
  .badge.role { border:none; background:transparent; color:var(--txt-faint); padding-left:0; }
  .badge.role::before { display:none; }
  .badge.gh    { color:#b69bff; border-color:#3a2f63; }
  .badge.net   { color:#4fd1c5; border-color:#1f4d49; }
  .badge.ver   { color:#cfd6e6; border-color:#3a4160; }
  .badge.srv   { color:#ff9a4d; border-color:#5a3a1f; }
  .badge.cf    { color:#ffb454; border-color:#5a4720; }
  .badge.ext   { color:#9aa3b8; border-color:#33394d; }
  .fwd { font-size: 12px; color: var(--warn); display:flex; align-items:center; gap:6px; }

  /* description + service kind */
  .card .desc { font-size: 12.5px; line-height: 1.45; color: var(--txt-dim);
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .types { display: flex; flex-wrap: wrap; gap: 6px; }
  .tbadge {
    font-size: 10.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 999px; border: 1px solid transparent;
  }
  .tbadge.t-spa     { color:#9cc4ff; background:rgba(110,168,254,.12); border-color:rgba(110,168,254,.35); }
  .tbadge.t-backend { color:#c3acff; background:rgba(124,92,255,.12); border-color:rgba(124,92,255,.35); }
  .tbadge.t-blog    { color:#ff9ec4; background:rgba(255,107,164,.12); border-color:rgba(255,107,164,.35); }
  .tbadge.t-library { color:#5fe3b6; background:rgba(67,211,158,.12); border-color:rgba(67,211,158,.35); }
  .tbadge.t-manual  { color:#ffc879; background:rgba(255,180,84,.13); border-color:rgba(255,180,84,.38); }
  .tbadge.t-webfront{ color:#7fe0d6; background:rgba(79,209,197,.12); border-color:rgba(79,209,197,.35); }
  .tbadge.t-other   { color:var(--txt-dim); background:var(--bg-soft); border-color:var(--line); }
  .sub { font-size: 11px; color: var(--txt-faint); display:inline-flex; align-items:center; gap:4px; }
  .sub::before { content:"·"; }
  .sub.solo::before { content:none; }

  .cardfoot { display:flex; flex-wrap:wrap; gap:8px; margin-top: 2px; padding-top: 10px; border-top: 1px solid var(--line-soft); }
  a.repo {
    position: relative; z-index: 2; display:inline-flex; align-items:center; gap:6px;
    font-size: 11.5px; color: var(--txt-dim); padding: 3px 9px; border-radius: 7px;
    border: 1px solid var(--line); background: var(--bg-soft);
  }
  a.repo:hover { color: var(--txt); border-color: var(--accent); }
  a.repo svg { flex: none; }
  .uses { font-size: 11px; color: var(--txt-faint); }
  .uses b { color: var(--txt-dim); font-weight: 600; }

  /* type filter row */
  .filterrow { display:flex; flex-wrap:wrap; align-items:center; gap:8px; }
  .chips.types { padding-top: 0; }
  .flabel { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--txt-faint); margin-right: 2px; }
  .chip.kind.on { background: linear-gradient(140deg, #5fd0ff, #7c5cff); }

  .empty { text-align: center; padding: 80px 20px; color: var(--txt-dim); }
  .empty .big { font-size: 40px; margin-bottom: 8px; }

  footer { max-width: 1180px; margin: 0 auto; padding: 24px 22px 60px; color: var(--txt-faint); font-size: 12.5px;
    border-top: 1px solid var(--line-soft); }
  footer a { color: var(--txt-dim); text-decoration: underline; text-underline-offset: 2px; }

  @media (max-width: 560px) {
    .brand p { display: none; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>

/* ---- join the deployed list with the services catalog ---- */
const norm = s => (s || "").toLowerCase().replace(/[^a-z0-9]/g, "");
const splitList = v => (v || "").split(",").map(s => s.trim()).filter(s => s && s !== "--");
const uniq = a => [...new Set(a)];

function enrich(projects, services) {
  const idx = {};
  (services || []).forEach(s => { if (s.name) idx[norm(s.name)] = s; });
  return projects.map(p => {
    let svcs = splitList(p.service).map(n => idx[norm(n)]).filter(Boolean);
    if (!svcs.length && idx[norm(p.domain)]) svcs = [idx[norm(p.domain)]];
    return Object.assign({}, p, {
      types: uniq(svcs.flatMap(s => splitList(s.type))),
      subtypes: uniq(svcs.flatMap(s => splitList(s.subtype))),
      repos: uniq(svcs.map(s => s.repo).filter(Boolean)),
      uses: uniq(svcs.flatMap(s => splitList(s.uses))),
      packages: uniq(svcs.map(s => s.package).filter(Boolean)),
      description: (svcs.map(s => s.description).find(Boolean)) || "",
    });
  });
}

let DATA = enrich(PROJECTS, typeof SERVICES !== "undefined" ? SERVICES : []);

/* ---- tiny RFC-4180-ish CSV parser ---- */
function parseCSV(text) {
  const rows = []; let row = [], field = "", i = 0, inQ = false;
  text = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  while (i < text.length) {
    const c = text[i];
    if (inQ) {
      if (c === '"') { if (text[i+1] === '"') { field += '"'; i++; } else inQ = false; }
      else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ",") { row.push(field); field = ""; }
      else if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
      else field += c;
    }
    i++;
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function csvToProjects(text) {
  const rows = parseCSV(text);
  if (!rows.length) return [];
  const head = rows[0].map(h => h.trim());
  const idx = name => head.indexOf(name);
  let nameIdx = head.findIndex(h => h.toLowerCase() === "name");
  if (nameIdx < 0) nameIdx = idx("Column 1");
  const c = { name: nameIdx, dom: idx("dominio"), eco: idx("ecosystem"), svc: idx("servizio"),
    be: idx("BE hosting"), fe: idx("FE hosting"), oth: idx("others"),
    st: idx("status"), fwd: idx("forward to"), att: idx("attention"), fea: idx("featured") };
  const g = (r, k) => (k >= 0 && r[k] != null ? r[k].trim() : "");
  const out = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    if (g(row, c.st).toLowerCase() !== "deployed") continue;
    out.push({ name: g(row, c.name), domain: g(row, c.dom), ecosystem: g(row, c.eco), service: g(row, c.svc),
      be: g(row, c.be), fe: g(row, c.fe), others: g(row, c.oth),
      forward: g(row, c.fwd), attention: g(row, c.att), featured: g(row, c.fea) });
  }
  out.sort((a, b) => (a.ecosystem.toLowerCase() || "zzz").localeCompare(b.ecosystem.toLowerCase() || "zzz") || a.domain.toLowerCase().localeCompare(b.domain.toLowerCase()));
  return out;
}

function csvToServices(text) {
  const rows = parseCSV(text);
  if (!rows.length) return [];
  const head = rows[0].map(h => h.trim());
  const idx = name => head.indexOf(name);
  const c = { name: idx("Servizio"), type: idx("type"), sub: idx("subtype"),
    pkg: idx("package"), uses: idx("uses"), repo: idx("Repo"), desc: idx("Descrizione") };
  const g = (r, k) => (k >= 0 && r[k] != null ? r[k].trim() : "");
  const out = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    if (!g(row, c.name)) continue;
    out.push({ name: g(row, c.name), type: g(row, c.type), subtype: g(row, c.sub),
      package: g(row, c.pkg), uses: g(row, c.uses), repo: g(row, c.repo), description: g(row, c.desc) });
  }
  return out;
}

/* ---- hosting badge classification ---- */
function hostClass(token) {
  const t = token.toLowerCase();
  if (t.includes("gh") || t.includes("pages") || t.includes("github")) return "gh";
  if (t.includes("netlify")) return "net";
  if (t.includes("vercel")) return "ver";
  if (t.includes("server")) return "srv";
  if (t.includes("cloudflare")) return "cf";
  return "ext";
}
function hostTokens(v) {
  return (v || "").split(/[,/]/).map(s => s.trim()).filter(s => s && s !== "--");
}

const ECO_LABEL = e => e || "Other";
const ESC = s => (s || "").replace(/[&<>"]/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[m]));

function matches(p) {
  if (state.featured && !isFeat(p)) return false;
  if (state.attn && p.attention.toLowerCase() !== "nok") return false;
  if (state.eco !== null && (p.ecosystem || "") !== state.eco) return false;
  if (state.type !== null && !p.types.some(t => t.toLowerCase() === state.type.toLowerCase())) return false;
  if (state.q) {
    const hay = [p.name, p.domain, p.service, p.ecosystem, p.be, p.fe, p.others, p.forward,
      p.description, p.types.join(" "), p.subtypes.join(" "), p.uses.join(" "),
      p.packages.join(" "), p.repos.join(" ")].join(" ").toLowerCase();
    if (!state.q.split(/\s+/).every(t => hay.includes(t))) return false;
  }
  return true;
}

function renderChips() {
  // ----- ecosystem + attention row -----
  const counts = {};
  DATA.forEach(p => { const k = p.ecosystem || ""; counts[k] = (counts[k] || 0) + 1; });
  const ecos = Object.keys(counts).sort((a, b) => (a.toLowerCase() || "zzz").localeCompare(b.toLowerCase() || "zzz"));
  const nok = DATA.filter(p => p.attention.toLowerCase() === "nok").length;
  const feat = DATA.filter(isFeat).length;
  const el = document.getElementById("chips");
  const allOn = state.eco === null && !state.attn && !state.featured;
  let html = `<div class="chip ${allOn ? "on" : ""}" data-eco="__all">All <span class="n">${DATA.length}</span></div>`;
  if (feat) html += `<div class="chip star ${state.featured ? "on" : ""}" data-feat="1">★ Featured <span class="n">${feat}</span></div>`;
  ecos.forEach(e => {
    html += `<div class="chip ${state.eco === e ? "on" : ""}" data-eco="${ESC(e)}">${ESC(ECO_LABEL(e))} <span class="n">${counts[e]}</span></div>`;
  });
  if (nok) html += `<div class="chip attn ${state.attn ? "on" : ""}" data-attn="1">⚠ Needs attention <span class="n">${nok}</span></div>`;
  el.innerHTML = html;
  el.querySelectorAll(".chip").forEach(ch => ch.addEventListener("click", () => {
    if (ch.dataset.feat) { state.featured = !state.featured; }
    else if (ch.dataset.attn) { state.attn = !state.attn; }
    else if (ch.dataset.eco === "__all") { state.eco = null; state.attn = false; state.featured = false; }
    else { state.eco = state.eco === ch.dataset.eco ? null : ch.dataset.eco; }
    render();
  }));

  // ----- service-type row (from the catalog sheet) -----
  const tCounts = {};
  DATA.forEach(p => p.types.forEach(t => { tCounts[t] = (tCounts[t] || 0) + 1; }));
  const types = Object.keys(tCounts).sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
  const tEl = document.getElementById("typeChips");
  if (!types.length) { tEl.innerHTML = ""; return; }
  let t = `<span class="flabel">Type</span>`;
  types.forEach(ty => {
    const on = state.type !== null && state.type.toLowerCase() === ty.toLowerCase();
    t += `<div class="chip kind ${on ? "on" : ""}" data-type="${ESC(ty)}">${ESC(ty)} <span class="n">${tCounts[ty]}</span></div>`;
  });
  tEl.innerHTML = t;
  tEl.querySelectorAll(".chip").forEach(ch => ch.addEventListener("click", () => {
    state.type = state.type === ch.dataset.type ? null : ch.dataset.type;
    render();
  }));
}

const GH_SVG = `<svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38l-.01-1.49c-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.4 7.4 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48l-.01 2.2c0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>`;
const TYPE_CLASS = t => "t-" + (["spa", "backend", "blog", "library", "manual", "webfront"].includes(t.toLowerCase()) ? t.toLowerCase() : "other");
const repoLabel = u => u.replace(/^https?:\/\/(www\.)?github\.com\//i, "").replace(/\/$/, "") || u;

function cardHTML(p) {
  const url = "https://" + p.domain;
  const fea = isFeat(p);
  const star = fea ? `<span class="star" title="Featured">★</span> ` : "";
  const title = p.name || p.domain;
  const showAddr = p.name && p.name !== p.domain;          // friendly name -> show the URL underneath
  const titleMono = showAddr ? "" : " mono";               // domain-as-title renders monospace
  const addr = showAddr ? `<div class="addr mono">${ESC(p.domain)}</div>` : "";
  const svcName = p.service && p.service !== p.domain && p.service !== title ? ESC(p.service) : "";
  const subTxt = p.subtypes.length ? p.subtypes.map(ESC).join(", ") : "";
  let svcInner = "";
  if (svcName && subTxt) svcInner = `${svcName} <span class="sub">${subTxt}</span>`;
  else if (svcName) svcInner = svcName;
  else if (subTxt) svcInner = `<span class="sub solo">${subTxt}</span>`;
  const svc = svcInner ? `<div class="svc">${svcInner}</div>` : "";
  const nok = p.attention.toLowerCase() === "nok";
  const types = p.types.length
    ? `<div class="types">${p.types.map(t => `<span class="tbadge ${TYPE_CLASS(t)}">${ESC(t)}</span>`).join("")}</div>` : "";
  const desc = p.description ? `<div class="desc">${ESC(p.description)}</div>` : "";
  const badges = [];
  hostTokens(p.fe).forEach(t => badges.push(`<span class="badge ${hostClass(t)}">${ESC(t)}</span>`));
  hostTokens(p.be).forEach(t => badges.push(`<span class="badge ${hostClass(t)}">${ESC(t)} ·be</span>`));
  hostTokens(p.others).forEach(t => badges.push(`<span class="badge ext">${ESC(t)}</span>`));
  if (!badges.length) badges.push(`<span class="badge ext">live</span>`);
  const fwd = p.forward ? `<div class="fwd">→ forwards to <span class="mono">${ESC(p.forward)}</span></div>` : "";
  const uses = p.uses.length ? `<div class="uses"><b>uses</b> ${p.uses.map(ESC).join(", ")}</div>` : "";
  const repos = p.repos.length
    ? `<div class="cardfoot">${p.repos.map(r => `<a class="repo" href="${ESC(r)}" target="_blank" rel="noopener" title="${ESC(r)}">${GH_SVG}${ESC(repoLabel(r))}</a>`).join("")}</div>` : "";
  return `<div class="card${fea ? " featured" : ""}">
    <div class="head">
      <div>
        <a class="domain${titleMono}" href="${ESC(url)}" target="_blank" rel="noopener" title="${ESC(url)}">${star}${ESC(title)} <span class="arrow">↗</span></a>
        ${addr}
        ${svc}
      </div>
      <span class="attn ${nok ? "nok" : ""}" title="${nok ? "Needs attention" : "OK"}"></span>
    </div>
    ${types}
    ${desc}
    ${fwd}
    <div class="badges">${badges.join("")}</div>
    ${uses}
    ${repos}
  </div>`;
}

function sectionHTML(title, items, cls) {
  return `<section class="group${cls ? " " + cls : ""}">
    <h2>${title} <span class="cnt">${items.length}</span><span class="bar"></span></h2>
    <div class="grid">${items.map(cardHTML).join("")}</div>
  </section>`;
}

function render() {
  renderChips();
  const list = DATA.filter(matches);
  const main = document.getElementById("main");
  if (!list.length) {
    main.innerHTML = `<div class="empty"><div class="big">🔍</div>No projects match your filters.</div>`;
  } else {
    let out = "";
    // Showcase featured projects at the top of the unfiltered landing view.
    const pureDefault = !state.q && state.eco === null && state.type === null && !state.attn && !state.featured;
    const feat = list.filter(isFeat);
    if (pureDefault && feat.length) out += sectionHTML(`<span class="star">★</span> Featured`, feat, "feat");
    const groups = {};
    list.forEach(p => { const k = p.ecosystem || ""; (groups[k] = groups[k] || []).push(p); });
    const keys = Object.keys(groups).sort((a, b) => (a.toLowerCase() || "zzz").localeCompare(b.toLowerCase() || "zzz"));
    out += keys.map(k => sectionHTML(ESC(ECO_LABEL(k)), groups[k], "")).join("");
    main.innerHTML = out;
  }
  document.getElementById("footCount").textContent =
    `${list.length} of ${DATA.length} deployed project${DATA.length === 1 ? "" : "s"}`;
}

function setStatus(kind, text) {
  const el = document.getElementById("status");
  el.className = "status " + kind;
  document.getElementById("statusText").textContent = text;
}

/* initial paint from embedded snapshot */
setStatus("snap", "snapshot");
render();

/* live refresh: fetch both tabs and join them in the browser */
Promise.all([
  fetch(CSV_URL, { cache: "no-store" }).then(r => { if (!r.ok) throw new Error(r.status); return r.text(); }),
  fetch(CATALOG_URL, { cache: "no-store" }).then(r => r.ok ? r.text() : "").catch(() => ""),
]).then(([pText, sText]) => {
  const live = csvToProjects(pText);
  if (!live.length) { setStatus("snap", "snapshot"); return; }
  const services = sText ? csvToServices(sText) : (typeof SERVICES !== "undefined" ? SERVICES : []);
  DATA = enrich(live, services);
  render();
  setStatus("live", "live · synced with sheet");
}).catch(() => setStatus("snap", "snapshot (offline)"));

/* keyboard: "/" focuses search, Esc clears */
const q = document.getElementById("q");
q.addEventListener("input", e => { state.q = e.target.value.trim().toLowerCase(); render(); });
document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement !== q) { e.preventDefault(); q.focus(); }
  if (e.key === "Escape" && document.activeElement === q) { q.value = ""; state.q = ""; render(); q.blur(); }
});
</script>
